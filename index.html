  <style>
    /* ── Hero ── */
    .hero {
      position: relative;
      padding: 72px 0 56px;
      text-align: center;
      overflow: hidden;
    }

    /* Stars */
    .star {
      position: absolute;
      width: 3px; height: 3px;
      background: #fff;
      border-radius: 50%;
      animation: star-twinkle var(--dur, 3s) ease-in-out infinite var(--delay, 0s);
    }
    .star:nth-child(1) { top: 12%; left: 10%;  --dur: 2.8s; --delay: 0.0s; }
    .star:nth-child(2) { top: 20%; left: 84%;  --dur: 3.5s; --delay: 0.8s; }
    .star:nth-child(3) { top:  7%; left: 54%;  --dur: 2.2s; --delay: 1.2s; }
    .star:nth-child(4) { top: 38%; left:  4%;  --dur: 4.0s; --delay: 0.4s; }
    .star:nth-child(5) { top: 16%; left: 70%;  --dur: 3.1s; --delay: 2.0s; }
    @keyframes star-twinkle {
      0%, 100% { opacity: 0.18; transform: scale(1);   }
      50%       { opacity: 0.85; transform: scale(1.7); }
    }

    .hero h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 14px;
      line-height: 1.35;
    }
    .hero h1 span { color: var(--fire-orange); }
    .hero p {
      font-size: 15px;
      color: var(--text-sub);
      max-width: 380px;
      margin: 0 auto;
      line-height: 1.75;
    }

    /* ── Section title ── */
    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-sub);
      margin-bottom: 14px;
    }

    /* ── App card ── */
    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 14px;
      text-decoration: none;
      transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    }
    .app-card:hover {
      border-color: rgba(255,107,46,0.45);
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,107,46,0.1);
    }
    .app-icon {
      font-size: 30px;
      width: 60px; height: 60px;
      background: rgba(255,107,46,0.08);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      border: 1px solid rgba(255,107,46,0.18);
      box-shadow: 0 0 14px rgba(255,107,46,0.12);
      transition: box-shadow 0.25s;
    }
    .app-card:hover .app-icon {
      box-shadow: 0 0 24px rgba(255,107,46,0.3);
    }
    .app-info { flex: 1; }
    .app-name {
      font-size: 16px; font-weight: 700; color: var(--text);
      margin-bottom: 5px;
      display: flex; align-items: center; gap: 8px;
    }
    .app-desc { font-size: 13px; color: var(--text-sub); line-height: 1.55; }
    .app-arrow {
      color: var(--text-sub);
      font-size: 20px;
      flex-shrink: 0;
      transition: transform 0.2s, color 0.2s;
    }
    .app-card:hover .app-arrow { transform: translateX(3px); color: var(--fire-orange); }

    /* ── About card ── */
    .about-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.8;
    }
    .about-card strong { color: var(--text); }

  </style>
</head>
