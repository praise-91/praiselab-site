<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Praiselab — 삶에 필요한 앱을 만듭니다</title>
  <meta name="description" content="Praiselab은 삶에 필요한 앱을 만드는 1인 스튜디오입니다." />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D1117;
      --surface: #161B27;
      --surface2: #1E2535;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,107,46,0.35);
      --fire-orange: #FF6B2E;
      --fire-yellow: #FFB347;
      --forest: #4CAF80;
      --text: #E8EAF0;
      --text-sub: #7A8599;
      --text-dim: rgba(232,234,240,0.35);
      --radius: 16px;
      --glow: 0 0 40px rgba(255,107,46,0.12);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Canvas background ── */
    #ember-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.7;
    }

    /* ── Header ── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(13, 17, 23, 0.72);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--fire-orange), var(--fire-yellow));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .header-link {
      font-size: 13px;
      color: var(--text-sub);
      text-decoration: none;
      transition: color 0.2s;
    }
    .header-link:hover { color: var(--text); }

    /* ── Main container ── */
    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    /* ── Hero ── */
    .hero {
      padding: 88px 0 64px;
      text-align: center;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--fire-orange);
      background: rgba(255,107,46,0.08);
      border: 1px solid rgba(255,107,46,0.2);
      border-radius: 100px;
      padding: 5px 14px;
      margin-bottom: 28px;
    }

    .hero-eyebrow::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--fire-orange);
      box-shadow: 0 0 6px var(--fire-orange);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    .hero h1 {
      font-size: clamp(32px, 8vw, 44px);
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 18px;
    }

    .hero h1 .highlight {
      background: linear-gradient(135deg, var(--fire-orange) 0%, var(--fire-yellow) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 15px;
      color: var(--text-sub);
      line-height: 1.8;
      max-width: 320px;
      margin: 0 auto 36px;
    }

    .hero-scroll-hint {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 48px;
      animation: float 3s ease-in-out infinite;
    }

    .hero-scroll-hint svg {
      animation: bounce-down 1.5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @keyframes bounce-down {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(4px); opacity: 1; }
    }

    /* ── Section label ── */
    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-sub);
      margin-bottom: 16px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── App cards ── */
    .apps-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 48px;
    }

    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                  border-color 0.25s ease,
                  box-shadow 0.3s ease;
    }

    .app-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,107,46,0.04) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .app-card:hover {
      transform: translateY(-4px);
      border-color: var(--border-hover);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,107,46,0.08), 0 0 30px rgba(255,107,46,0.06);
    }

    .app-card:hover::before { opacity: 1; }

    .app-card--soon {
      opacity: 0.7;
    }

    .app-card--soon:hover {
      opacity: 1;
      border-color: rgba(255,255,255,0.1);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    }

    .app-card--soon:hover::before { opacity: 0; }

    .app-icon {
      width: 56px; height: 56px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      position: relative;
    }

    .app-icon--fire {
      background: linear-gradient(145deg, rgba(255,107,46,0.15), rgba(255,107,46,0.05));
      border: 1px solid rgba(255,107,46,0.2);
      box-shadow: 0 0 20px rgba(255,107,46,0.1);
    }

    .app-card:hover .app-icon--fire {
      box-shadow: 0 0 32px rgba(255,107,46,0.25);
    }

    .app-icon--clipboard {
      background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.08);
    }

    .app-info { flex: 1; min-width: 0; }

    .app-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 2px 8px;
      border-radius: 100px;
    }

    .badge--live {
      background: rgba(76,175,128,0.12);
      color: var(--forest);
      border: 1px solid rgba(76,175,128,0.25);
    }

    .badge--soon {
      background: rgba(255,255,255,0.05);
      color: var(--text-sub);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .app-desc {
      font-size: 13px;
      color: var(--text-sub);
      line-height: 1.6;
    }

    .app-arrow {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.25s;
    }

    .app-arrow svg {
      color: var(--text-sub);
      transition: transform 0.25s, color 0.25s;
    }

    .app-card:hover .app-arrow {
      background: rgba(255,107,46,0.1);
      border-color: rgba(255,107,46,0.3);
    }

    .app-card:hover .app-arrow svg {
      color: var(--fire-orange);
      transform: translateX(2px);
    }

    /* ── About card ── */
    .about-section {
      margin-bottom: 64px;
    }

    .about-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .about-card p {
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.9;
    }

    .about-card strong { color: var(--text); }

    /* ── Footer ── */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 32px 24px 48px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .footer-brand {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-sub);
      margin-bottom: 8px;
    }

    .footer-links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 10px;
    }

    .footer-links a {
      font-size: 12px;
      color: var(--text-sub);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--text); }

    .footer-sep {
      color: var(--border);
      font-size: 12px;
    }

    /* ── Reveal animations ── */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
// ── Ember particle animation ──
const canvas = document.getElementById('ember-canvas');
const ctx = canvas.getContext('2d');

let W, H, embers = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function randomBetween(a, b) { return a + Math.random() * (b - a); }

function createEmber() {
  return {
    x: randomBetween(W * 0.2, W * 0.8),
    y: H + 10,
    vx: randomBetween(-0.4, 0.4),
    vy: randomBetween(-0.8, -1.8),
    size: randomBetween(1.2, 2.8),
    alpha: randomBetween(0.4, 0.9),
    decay: randomBetween(0.003, 0.007),
    hue: randomBetween(15, 40), // orange to yellow
  };
}

// Seed initial embers
for (let i = 0; i < 35; i++) {
  const e = createEmber();
  e.y = randomBetween(0, H);
  embers.push(e);
}

function animateEmbers() {
  ctx.clearRect(0, 0, W, H);

  // Spawn new embers
  if (Math.random() < 0.4) embers.push(createEmber());

  embers = embers.filter(e => e.alpha > 0.01);

  embers.forEach(e => {
    e.x += e.vx;
    e.y += e.vy;
    e.vy *= 0.998; // slight deceleration
    e.vx += randomBetween(-0.02, 0.02); // drift
    e.alpha -= e.decay;

    ctx.beginPath();
    ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${e.hue}, 90%, 65%, ${e.alpha})`;
    ctx.shadowBlur = 8;
    ctx.shadowColor = `hsla(${e.hue}, 90%, 65%, 0.6)`;
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  requestAnimationFrame(animateEmbers);
}
animateEmbers();

// ── Scroll reveal ──
const revealEls = document.querySelectorAll('.reveal');
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
    }
  });
}, { threshold: 0.1 });

revealEls.forEach(el => observer.observe(el));
</script>
